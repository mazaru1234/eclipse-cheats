# Step 1: use this file BEFORE certbot (HTTP only, no SSL paths).
# Step 2: certbot --nginx -d eclipse-cheats.ru -d www.eclipse-cheats.ru
# Certbot will add HTTPS blocks automatically.

server {
    listen 80;
    listen [::]:80;
    server_name eclipse-cheats.ru www.eclipse-cheats.ru;

    client_max_body_size 10M;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
