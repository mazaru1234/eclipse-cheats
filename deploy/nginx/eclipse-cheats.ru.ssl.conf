# Production nginx for eclipse-cheats.ru (after certbot SSL paths exist)

server {
    listen 80;
    listen [::]:80;
    server_name eclipse-cheats.ru www.eclipse-cheats.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://eclipse-cheats.ru$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.eclipse-cheats.ru;

    ssl_certificate     /etc/letsencrypt/live/eclipse-cheats.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eclipse-cheats.ru/privkey.pem;

    return 301 https://eclipse-cheats.ru$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name eclipse-cheats.ru;

    ssl_certificate     /etc/letsencrypt/live/eclipse-cheats.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/eclipse-cheats.ru/privkey.pem;

    client_max_body_size 20M;

    # IMPORTANT: must match UPLOADS_DIR in .env.production
    location ^~ /uploads/ {
        alias /var/lib/eclipse-cheats/uploads/;
        expires 30d;
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
